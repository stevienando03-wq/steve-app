<title>Meilleure version de moi-même</title>
<style>
:root{
  --bleu:#14213D; --creme:#F5F1E8; --anthr:#4A5568; --or:#C8A24B;
  --on:#E3E8F0; --off:#F2EFE7; --vert:#1E6B33; --vertbg:#DFF0D8;
  --rouge:#9C2330; --rougebg:#F8D7DA; --ligne:#E3DFD4;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--creme);color:var(--bleu);
  font-family:-apple-system,'Segoe UI',Roboto,Aptos,system-ui,sans-serif;font-size:16px;-webkit-text-size-adjust:100%}
body{padding-bottom:78px;max-width:520px;margin:0 auto;min-height:100vh}
.head{background:var(--bleu);color:#fff;padding:18px 18px 14px;position:sticky;top:0;z-index:20}
.head h1{font-size:18px;font-weight:700;letter-spacing:.3px}
.head .mots{font-size:11px;color:#B9C2D6;margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.head .date{font-size:12px;color:var(--or);margin-top:6px;font-weight:600}
.wrap{padding:14px}
.card{background:#fff;border:1px solid var(--ligne);border-radius:14px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 2px rgba(20,33,61,.04)}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--anthr);margin-bottom:10px;font-weight:700}
.card h2 .tag{float:right;font-size:11px;color:var(--or)}
.sec-on{border-left:4px solid #8FA8C8}.sec-off{border-left:4px solid var(--or)}
.sec-done{border-left:4px solid #5BA86B}.sec-today{border-left:4px solid var(--or);background:#FCF8EC}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #F0ECE2;gap:10px}
.row:last-child{border-bottom:0}
.row .lab{font-size:13px;color:var(--anthr);flex:1}
.row .lab b{color:var(--bleu)}
.meal{font-size:13px;line-height:1.5;color:var(--bleu);padding:8px 0;border-bottom:1px solid #F0ECE2}
.meal:last-child{border-bottom:0}
.meal .k{display:inline-block;width:62px;font-size:11px;text-transform:uppercase;color:var(--or);font-weight:700;vertical-align:top}
.meal .v{display:inline-block;width:calc(100% - 66px)}
.pill{border:1px solid var(--ligne);background:#fff;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;
  color:var(--anthr);cursor:pointer;transition:.12s}
.pill.g.act{background:var(--vertbg);border-color:#9BC6A4;color:var(--vert)}
.pill.r.act{background:var(--rougebg);border-color:#E0A4AB;color:var(--rouge)}
.pills{display:flex;gap:8px}
.step{display:flex;align-items:center;gap:12px}
.step button{width:34px;height:34px;border-radius:9px;border:1px solid var(--ligne);background:#fff;font-size:20px;
  color:var(--bleu);font-weight:700;cursor:pointer;line-height:1}
.step .val{min-width:54px;text-align:center;font-weight:700;font-size:15px}
.bar{height:9px;background:#EEE9DD;border-radius:6px;overflow:hidden;margin-top:5px}
.bar > i{display:block;height:100%;background:var(--or);border-radius:6px}
.bar.over > i{background:var(--rouge)}
.bar.warn > i{background:#D99A2B}
.kpi{display:flex;gap:10px;flex-wrap:wrap}
.kpi .box{flex:1;min-width:78px;background:var(--bleu);color:#fff;border-radius:12px;padding:11px 8px;text-align:center}
.kpi .box.alt{background:var(--anthr)}
.kpi .box .n{font-size:21px;font-weight:800;line-height:1}
.kpi .box .t{font-size:10px;color:#C3CADB;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.daycard{border:1px solid var(--ligne);border-radius:12px;padding:11px;margin-bottom:9px;background:#fff}
.daycard .top{display:flex;justify-content:space-between;align-items:center}
.daycard .dl{font-weight:700;font-size:14px}
.daycard .st{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:700}
.st.on{background:var(--on);color:var(--bleu)}.st.off{background:var(--off);color:var(--anthr)}
.st.done{background:var(--vertbg);color:var(--vert)}.st.today{background:var(--or);color:#fff}
.daycard .sub{font-size:12px;color:var(--anthr);margin-top:6px;line-height:1.45}
.acc{border:1px solid var(--ligne);border-radius:12px;margin-bottom:9px;overflow:hidden;background:#fff}
.acc>.h{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.acc>.h .nm{font-weight:700;font-size:13px}
.acc>.h .meta{font-size:11px;color:var(--or);font-weight:600}
.acc>.b{display:none;padding:0 14px 14px;font-size:13px;line-height:1.6;color:var(--anthr);white-space:pre-line;border-top:1px solid #F0ECE2}
.acc.open>.b{display:block}
.chk{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid #F0ECE2;cursor:pointer}
.chk:last-child{border-bottom:0}
.chk .bx{width:20px;height:20px;border:2px solid var(--ligne);border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.chk.on .bx{background:var(--vert);border-color:var(--vert)}
.chk.on .nm{text-decoration:line-through;color:#A9A293}
.chk .px{margin-left:auto;font-size:11px;color:var(--anthr)}
.catname{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--or);font-weight:700;margin:12px 0 4px}
.spend{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F0ECE2}
.spend .c{flex:1;font-size:13px}
.spend .amt{font-size:12px;color:var(--anthr);min-width:84px;text-align:right}
.spend input{width:66px;padding:6px;border:1px solid var(--ligne);border-radius:8px;font-size:13px;text-align:right}
.note{font-size:12px;color:var(--anthr);line-height:1.5}
.big{font-size:26px;font-weight:800}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;border-top:1px solid var(--ligne);
  display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:1 0 auto;min-width:60px;border:0;background:none;padding:9px 2px 8px;cursor:pointer;color:#A9A293;font-size:10px;font-weight:600}
.nav button .ic{font-size:19px;display:block;margin-bottom:2px}
.nav button.act{color:var(--bleu)}
.nav button.act .ic{transform:translateY(-1px)}
.tab{display:none}.tab.act{display:block}
.hint{background:#FCF8EC;border:1px dashed var(--or);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--anthr);line-height:1.5;margin-bottom:12px}
.miniobj{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #F0ECE2;font-size:13px}
.miniobj:last-child{border:0}.miniobj b{color:var(--bleu)}.miniobj .c{color:var(--anthr);text-align:right;max-width:55%}
.headbtns{position:absolute;top:14px;right:14px;display:flex;gap:8px}
.headbtns button{background:rgba(255,255,255,.14);border:0;color:#fff;width:34px;height:34px;border-radius:9px;font-size:15px;cursor:pointer}
.alert{border-left:4px solid var(--rouge);background:#FCF3F2}
.pomo{position:fixed;inset:0;background:rgba(10,15,25,.86);display:none;align-items:center;justify-content:center;z-index:50}
.pomo.open{display:flex}
.pomo .box2{background:#fff;border-radius:18px;padding:24px;width:84%;max-width:300px;text-align:center}
.pomo .ph{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--or);font-weight:700}
.pomo .time{font-size:56px;font-weight:800;color:var(--bleu);margin:6px 0;font-variant-numeric:tabular-nums}
.pomo .ctrls{display:flex;gap:10px;justify-content:center;margin-top:14px}
.pomo .ctrls button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--ligne);background:var(--creme);color:var(--bleu);font-weight:700;cursor:pointer}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pgrid .ph{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;background:var(--off)}
.pgrid .ph img{width:100%;height:100%;object-fit:cover;display:block}
.pgrid .ph .del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:0;border-radius:6px;font-size:12px;width:22px;height:22px;cursor:pointer}
.pgrid .ph .cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 4px;text-align:center}
.hbars{display:flex;gap:4px;align-items:flex-end;height:46px;margin-top:8px}
.hbars .hb{flex:1;background:var(--or);border-radius:3px 3px 0 0;min-height:3px}
body.dark{--creme:#161b24;--bleu:#E8EBF1;--anthr:#AEB6C4;--ligne:#2c3543;--on:#22304a;--off:#2a2722}
body.dark .card,body.dark .daycard,body.dark .acc,body.dark .pill,body.dark .step button,
body.dark .nav,body.dark input,body.dark textarea,body.dark .pomo .box2,body.dark .pomo .ctrls button{background:#1f2733;color:var(--bleu)}
body.dark .card{border-color:#2c3543}
body.dark .hint{background:#2a2410}
body.dark .sec-today,body.dark .alert{background:#23262f}
body.dark .head{background:#0e1729}
body.dark .kpi .box{background:#2a3346}body.dark .kpi .box.alt{background:#3a4456}
body.dark .nav button{color:#7e879a}body.dark .nav button.act{color:var(--bleu)}
body.dark .bar{background:#2c3543}
body.dark .pill.g.act{background:#1e3a26;color:#9fdcae}body.dark .pill.r.act{background:#3a1f24;color:#e8a8b0}
body.dark .st.on{background:#22304a;color:#cdd6e6}body.dark .st.off{background:#2a2722;color:var(--anthr)}
</style>

        Un découvert qui sert à MANGER pour ta masse = bon découvert (~0,65 € d'agios/15 j), remboursé à la paie.
      </div></div>`;
  } else {
    h+=`<div class="hint">Entre ton solde ci-dessus → je calcule ta marge jusqu'à la paie et ton budget/jour.</div>`;
  }
  // 3. Réappros (générique, pas de données perso)
  h+=`<div class="card"><h2>Réappros jusqu'à la paie <span class="tag">socle déjà payé</span></h2>

  FIN.leviers.forEach(([p,t])=>{h+=`<div class="miniobj"><b>${p}</b><span class="c">${t}</span></div>`;});

// pomodoro 25/5
(function(){
 let secs=25*60,phase='Travail',running=false,timer=null,count=0;
 const ov=document.getElementById('pomo'),tEl=document.getElementById('pomoTime'),phEl=document.getElementById('pomoPhase'),cEl=document.getElementById('pomoCount'),stB=document.getElementById('pomoStart');
 function fmt(){const m=Math.floor(secs/60),s=secs%60;tEl.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;phEl.textContent=phase;cEl.textContent=count+' pomodoro fait(s)';}
 function tick(){secs--;if(secs<0){if(phase==='Travail'){count++;phase='Pause';secs=5*60;}else{phase='Travail';secs=25*60;}}fmt();}
 stB.addEventListener('click',function(){running=!running;stB.textContent=running?'Pause':'Reprendre';if(running){timer=setInterval(tick,1000);}else{clearInterval(timer);}});
 document.getElementById('pomoReset').addEventListener('click',function(){clearInterval(timer);running=false;stB.textContent='Démarrer';phase='Travail';secs=25*60;fmt();});
 document.getElementById('pomoBtn').addEventListener('click',function(){ov.classList.add('open');fmt();});
 document.getElementById('pomoClose').addEventListener('click',function(){ov.classList.remove('open');});
 fmt();
})();
// photos garde-robe
function addPhoto(file){
 const r=new FileReader();
 r.onload=function(){const img=new Image();img.onload=function(){
   const max=600;let w=img.width,h=img.height;
   if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
   const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
   try{S.photos.push({id:String(Date.now()),data:cv.toDataURL('image/jpeg',0.6)});save();renderStyle();}
   catch(e){alert('Mémoire pleine — supprime quelques photos.');}
 };img.src=r.result;};
 r.readAsDataURL(file);
}
